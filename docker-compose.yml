services:
  # ─────────────────────────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: achilltest-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-achilltest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB:       ${POSTGRES_DB:-achilltest}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-achilltest}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────
  # Redis
  # ─────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: achilltest-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          memory: 384M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────
  # API Backend
  # ─────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV:           production
      PORT:               3001
      DATABASE_URL:       postgres://${POSTGRES_USER:-achilltest}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-achilltest}
      REDIS_URL:          redis://redis:6379
      JWT_SECRET:         ${JWT_SECRET}
      SERVER_ENCRYPTION_KEY: ${SERVER_ENCRYPTION_KEY}
      FRONTEND_URL:       ${FRONTEND_URL:-http://localhost:3000}
      MP_ACCESS_TOKEN:    ${MP_ACCESS_TOKEN}
      MP_CURRENCY:        ${MP_CURRENCY:-MXN}
      MP_PRICE_STARTER:   ${MP_PRICE_STARTER:-1380}
      MP_PRICE_TEAMMATE:  ${MP_PRICE_TEAMMATE:-2252}
      MP_PLAN_STARTER_ID: ${MP_PLAN_STARTER_ID}
      MP_PLAN_TEAMMATE_ID: ${MP_PLAN_TEAMMATE_ID}
      ANTHROPIC_API_KEY:  ${ANTHROPIC_API_KEY}
      SCREENSHOT_DIR:     /data/screenshots
      REPORTS_DIR:        /data/reports
    volumes:
      - artifacts-data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─────────────────────────────────────────────────────────
  # Workers Playwright — escalables con --scale worker=N
  # ─────────────────────────────────────────────────────────
  # Por defecto 8 workers × 3 concurrency = 24 simultáneos
  # En producción Hetzner CCX33: docker compose up -d --scale worker=20
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    environment:
      NODE_ENV:          production
      DATABASE_URL:      postgres://${POSTGRES_USER:-achilltest}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-achilltest}
      REDIS_URL:         redis://redis:6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SERVER_ENCRYPTION_KEY: ${SERVER_ENCRYPTION_KEY}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-3}
      SCREENSHOT_DIR:    /data/screenshots
      REPORTS_DIR:       /data/reports
    volumes:
      - artifacts-data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 8                # Default 8 workers; sube con --scale worker=20
      resources:
        limits:
          memory: 700M
          cpus:   '0.6'
        reservations:
          memory: 300M
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ─────────────────────────────────────────────────────────
  # Frontend Next.js
  # ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV:    production
      BACKEND_URL: http://api:3001
    ports:
      - "3000:3000"
    depends_on:
      - api
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # ─────────────────────────────────────────────────────────
  # Nginx Load Balancer
  # ─────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: achilltest-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
      - artifacts-data:/srv/artifacts:ro   # Para servir reportes y screenshots
    depends_on:
      - api
      - frontend
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  postgres-data:
  redis-data:
  artifacts-data:           # ← Volumen compartido: reportes + screenshots
