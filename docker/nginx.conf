events {
  worker_connections 1024;
}

http {
  upstream api {
    server api:3001;
  }

  upstream frontend {
    server frontend:3000;
  }

  # Rate limiting
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
  limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

  server {
    listen 80;
    server_name achilltest.io www.achilltest.io;

    # Redirect HTTP → HTTPS en producción
    # return 301 https://$host$request_uri;

    client_max_body_size 50M;

    # API
    location /api/ {
      limit_req zone=api_limit burst=20 nodelay;
      proxy_pass http://api;
      proxy_http_version 1.1;
      proxy_set_header Upgrade            $http_upgrade;
      proxy_set_header Connection         "upgrade";
      proxy_set_header Host               $host;
      proxy_set_header X-Real-IP          $remote_addr;
      proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto  $scheme;
      proxy_cache_bypass                  $http_upgrade;
      proxy_read_timeout 300s;
    }

    # Auth — rate limit más estricto
    location /api/auth/ {
      limit_req zone=auth_limit burst=5 nodelay;
      proxy_pass http://api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Frontend
    location / {
      proxy_pass http://frontend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade            $http_upgrade;
      proxy_set_header Connection         "upgrade";
      proxy_set_header Host               $host;
      proxy_set_header X-Real-IP          $remote_addr;
      proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto  $scheme;
      proxy_cache_bypass                  $http_upgrade;
    }

    # Webhook MP — sin rate limit estricto
    location /api/mp/webhook {
      proxy_pass http://api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }

  # Configuración para HTTPS (cuando tengas SSL listo)
  # server {
  #   listen 443 ssl http2;
  #   server_name achilltest.io;
  #
  #   ssl_certificate     /etc/nginx/ssl/fullchain.pem;
  #   ssl_certificate_key /etc/nginx/ssl/privkey.pem;
  #
  #   # ... mismo contenido que arriba ...
  # }
}
